<!DOCTYPE html>
<html>
<head><title>Screenshot Helper</title></head>
<body>
<h2>Screenshot Helper</h2>
<input type="file" id="fileInput" accept="image/*">
<p id="status">Waiting for file...</p>
<textarea id="b64" rows="5" cols="80" style="font-size:10px"></textarea>
<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    document.getElementById('b64').value = evt.target.result;
    document.getElementById('status').textContent = 'Done! Length: ' + evt.target.result.length;
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
